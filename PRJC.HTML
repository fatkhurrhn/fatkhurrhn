<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #121212;
      margin: 0;
      padding: 0;
      color: #fff;
    }

    section {
      max-width: 600px;
      margin: 50px auto;
      padding: 30px;
      background-color: #1e1e1e;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      box-sizing: border-box;
      width: 100%;
    }

    h2 {
      text-align: center;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 20px;
      font-weight: 600;
    }

    p {
      text-align: center;
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    a {
      color: #1e90ff;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #1a73e8;
    }

    input, textarea {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      background-color: #333;
      border: 1px solid #555;
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.3s ease, background-color 0.3s ease;
      box-sizing: border-box;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #1e90ff;
      background-color: #444;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #1e90ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
      box-sizing: border-box;
    }

    button:hover {
      background-color: #1a73e8;
    }

    /* Responsiveness */
    @media (max-width: 768px) {
      section {
        padding: 25px;
      }

      h2 {
        font-size: 1.75rem;
      }

      p {
        font-size: 0.95rem;
      }

      input, textarea, button {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      section {
        padding: 20px;
      }

      h2 {
        font-size: 1.6rem;
      }

      p {
        font-size: 0.9rem;
      }

      input, textarea, button {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <section id="contact">
    <h2>Contact Me</h2>
    <p>Please contact me directly at my 
      <a href="mailto:sanidhya.verma12345@gmail.com">e-mail</a> 
      or through this form.
    </p>
    <form action="#" method="POST">
      <input type="text" id="name" placeholder="Your name" required>
      <input type="email" id="email" placeholder="Your email" required>
      <textarea id="message" placeholder="Your message" rows="5" required></textarea>
      <button type="submit">Submit</button>
    </form>
  </section>
</body>
</html>
